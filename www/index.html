<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chesszerd</title>
<style>
:root {
  --bg: #1e1e1e; --panel: #2a2a2a; --text: #eee; --accent: #c8a96e; --gold: #f1c40f;
  --cell-light: #f0d9b5; --cell-dark: #b58863;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif;
  display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
}
#app-container {
  width: 100%; max-width: 420px; height: 100vh; display: flex; flex-direction: column;
  background: var(--panel); border-radius: 12px; overflow: hidden;
}
.tab-bar { display: flex; background: #1a1a1a; padding: 4px; gap: 2px; }
.tab-btn {
  flex: 1; text-align: center; padding: 10px; color: #aaa; cursor: pointer;
  font-size: 14px; font-weight: bold; border-radius: 6px 6px 0 0;
}
.tab-btn.active { background: var(--panel); color: var(--accent); }
.tab-content { display: none; flex: 1; overflow-y: auto; padding: 12px; }
#tab-game { display: block; }

#chessboard {
  width: min(360px, 90vw); height: min(360px, 90vw);
  margin: 0 auto; display: grid;
  grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
  border: 3px solid var(--accent); border-radius: 8px; overflow: hidden;
}
.cell {
  display: flex; align-items: center; justify-content: center;
  font-size: min(7vw, 38px); line-height: 1; user-select: none; position: relative; cursor: pointer;
}
.cell.light { background: var(--cell-light); }
.cell.dark { background: var(--cell-dark); }

.piece { font-weight: bold; }
.piece.white { color: #ffffff; text-shadow: 1px 1px 0 #000000; }
.piece.black { color: #1a1a1a; text-shadow: 1px 1px 0 #ffffff; }

.cell.valid-move::after {
  content: ''; position: absolute; width: 14px; height: 14px;
  background: rgba(0, 180, 0, 0.55); border-radius: 50%; pointer-events: none; z-index: 2;
}
.cell.valid-capture::after {
  content: ''; position: absolute; width: 86%; height: 86%;
  border: 4px solid rgba(255, 70, 70, 0.75); border-radius: 50%;
  box-sizing: border-box; pointer-events: none; z-index: 2;
}

.control-bar { display: flex; gap: 8px; padding: 8px 0; justify-content: center; flex-wrap: wrap; }
button {
  background: var(--accent); color: #fff; border: none; padding: 10px 16px;
  border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px;
}
.aizen-quote { font-style: italic; color: var(--gold); text-align: center; margin: 8px 0; }

#tab-profile, #tab-settings { text-align: center; }
.avatar-preview {
  width: 80px; height: 80px; border-radius: 50%; background: #444 center/cover;
  margin: 10px auto; border: 3px solid var(--accent);
}
input[type="text"], input[type="file"] { margin: 8px 0; }
input[type="text"] {
  background: #333; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 6px; width: 80%;
}
input[type="file"] { color: #fff; }
.theme-selector { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 8px 0; }
.theme-btn {
  background: #444; color: white; padding: 6px 12px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px;
}
.theme-btn.active { background: var(--accent); }
</style>
</head>
<body>
<div id="app-container">
  <div class="tab-bar">
    <div class="tab-btn active" onclick="ChesszerdApp.switchTab('tab-game')">Игра</div>
    <div class="tab-btn" onclick="ChesszerdApp.switchTab('tab-profile')">Профиль</div>
    <div class="tab-btn" onclick="ChesszerdApp.switchTab('tab-settings')">Стиль</div>
  </div>

  <div id="tab-game" class="tab-content">
    <div id="chessboard"></div>
    <div class="control-bar">
      <button id="btn-new-game">Новая игра</button>
      <button onclick="ChesszerdApp.undoMove()">Отменить</button>
    </div>
    <div id="aizen-quote" class="aizen-quote"></div>
  </div>

  <div id="tab-profile" class="tab-content">
    <h2 id="profile-greeting">Игрок</h2>
    <p>ELO: <span id="elo">1200</span></p>
    <p>Побед: <span id="wins">0</span> / Поражений: <span id="losses">0</span></p>
    <div id="avatar-preview" class="avatar-preview"></div>
    <input type="file" id="avatar-upload" accept="image/*">
    <br>
    <input type="text" id="username-input" placeholder="Твой ник" maxlength="20">
    <br><button onclick="ChesszerdApp.saveProfile()">Сохранить</button>
  </div>

  <div id="tab-settings" class="tab-content">
    <h3>Тема доски</h3>
    <div class="theme-selector" id="theme-selector"></div>
  </div>
</div>

<script src="engine.js"></script>
<script src="app.js"></script>
</body>
</html>

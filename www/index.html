<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Chesszerd - Сосуке Айзен</title>
    <style>
        :root {
            --light-square: #f0d9b5;
            --dark-square: #b58863;
            --accent: #c8a96e;
            --bg: #1a1a2e;
            --text: #ffffff;
            --text-secondary: #b0b0b0;
            --button-bg: #2a2a4e;
            --button-hover: #3a3a5e;
            --selected: #ffd700;
            --valid-move: rgba(0, 255, 0, 0.3);
            --capture-move: rgba(255, 0, 0, 0.3);
            --font-mono: 'Courier New', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 10px;
        }

        .header {
            text-align: center;
            padding: 15px 10px;
            background: linear-gradient(135deg, #1a1a2e 0%, #2a2a4e 100%);
            border-bottom: 2px solid var(--accent);
        }

        .header h1 {
            font-size: 1.8em;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(200, 169, 110, 0.5);
            margin: 0;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin: 10px 0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: var(--button-bg);
            border: 1px solid var(--accent);
            color: var(--text);
            cursor: pointer;
            font-size: 0.9em;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #000;
            font-weight: bold;
        }

        .tab-content {
            display: block;
        }

        .tab-content.hidden {
            display: none;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            aspect-ratio: 1;
            max-width: 480px;
            margin: 10px auto;
            border: 3px solid var(--accent);
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(200, 169, 110, 0.3);
        }

        #board.flipped {
            transform: rotate(180deg);
        }

        #board.flipped .square {
            transform: rotate(180deg);
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(24px, 5vw, 48px);
            font-family: var(--font-mono);
            cursor: pointer;
            position: relative;
            transition: background-color 0.2s;
        }

        .square.light {
            background-color: var(--light-square);
        }

        .square.dark {
            background-color: var(--dark-square);
        }

        .square.selected {
            background-color: rgba(255, 215, 0, 0.5) !important;
        }

        .square.valid-move::after {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            background: var(--valid-move);
            border-radius: 50%;
        }

        .square.capture-move {
            background-color: var(--capture-move) !important;
        }

        /* Стили NEO */
        .style-neo .square {
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5), 0 0 10px rgba(200,169,110,0.3);
        }

        /* Стили Standard */
        .style-standard .square {
            font-weight: normal;
            text-shadow: none;
        }

        /* Стили Minimal */
        .style-minimal .square {
            font-weight: 300;
            text-shadow: none;
        }

        .controls {
            display: flex;
            gap: 8px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            background: var(--button-bg);
            border: 1px solid var(--accent);
            color: var(--text);
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.9em;
            transition: all 0.3s;
            flex: 1;
            min-width: 80px;
        }

        .btn:hover {
            background: var(--button-hover);
        }

        .btn:active {
            background: var(--accent);
            color: #000;
        }

        .status {
            text-align: center;
            padding: 10px;
            background: var(--button-bg);
            border-radius: 8px;
            margin: 10px 0;
            font-size: 1em;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quote {
            text-align: center;
            font-style: italic;
            color: var(--accent);
            padding: 15px;
            background: rgba(200, 169, 110, 0.1);
            border-radius: 8px;
            margin: 10px 0;
            border-left: 3px solid var(--accent);
        }

        .profile-section, .style-section {
            padding: 15px;
        }

        .profile-field {
            margin: 10px 0;
        }

        .profile-field label {
            display: block;
            color: var(--text-secondary);
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .profile-field input {
            width: 100%;
            padding: 10px;
            background: var(--button-bg);
            border: 1px solid var(--accent);
            color: var(--text);
            border-radius: 8px;
            font-size: 1em;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            text-align: center;
        }

        .stat-item {
            flex: 1;
            padding: 10px;
            background: var(--button-bg);
            border-radius: 8px;
        }

        .stat-value {
            font-size: 1.5em;
            color: var(--accent);
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.8em;
            color: var(--text-secondary);
        }

        .avatar-selector {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .avatar-option {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
            overflow: hidden;
        }

        .avatar-option.selected {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(200, 169, 110, 0.5);
        }

        .avatar-option img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .theme-buttons, .style-buttons, .lang-buttons {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .theme-btn, .style-btn, .lang-btn {
            padding: 8px 15px;
            background: var(--button-bg);
            border: 1px solid var(--accent);
            color: var(--text);
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        .theme-btn.active, .style-btn.active, .lang-btn.active {
            background: var(--accent);
            color: #000;
            font-weight: bold;
        }

        .oauth-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px 0;
        }

        .btn-google {
            background: #4285f4;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-chesscom {
            background: #81b64c;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 1s;
        }

        .welcome-portrait {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .welcome-portrait img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .welcome-text {
            color: var(--accent);
            font-size: 1.5em;
            text-align: center;
            text-shadow: 0 0 20px rgba(200, 169, 110, 0.5);
        }

        @media (max-width: 400px) {
            .header h1 { font-size: 1.4em; }
            .btn { padding: 10px 15px; font-size: 0.8em; }
            .square { font-size: clamp(20px, 6vw, 36px); }
        }

        @media (min-width: 768px) {
            .container { max-width: 600px; }
            #board { max-width: 560px; }
        }
    </style>
</head>
<body>

        <!-- Вкладка Стиль -->

            <div class="style-section">
                <h3>Темы доски</h3>

    <script src="engine.js"></script>
